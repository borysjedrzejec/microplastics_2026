<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prototype</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="crt_effect.css">

    <script src="js/game.js"></script>
    <script src="js/assets.js"></script>
    <script src="js/db.js"></script>
    <script src="js/scenarios.js" defer></script>

    <script src="js/apps/shutdown.js"></script>

    <script src="js/apps/accessibility.js" defer></script>

    <script src="js/apps/notepad.js" defer></script>
    <script src="js/apps/file_explorer.js" defer></script>
    <script src="js/apps/mail.js" defer></script>
    <script src="js/apps/mail_reader.js" defer></script>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="text-flicker" :class="{ 'disable-animations': $store.accessibility.disableAnimations }" x-data="Game" 
    @mousemove="updateCamera" @open-app.window="openProgram($event.detail.id, $event.detail.payload)">

    <div id="background"></div>

    <div id="glass-container"></div>
    <div id="monitor-vignette">
        <div id="monitor-screen" @mousedown="playRandomClick()" @keydown="playKeystroke($event)" :style="`transform: rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1);` + bloomColor">
            <div id="crt-container" class="crt-filter"></div>

            <div id="boot-screen" 
                x-show="!isStarted, !isBooting" 
                x-transition.opacity.duration.200ms>
                
                <div class="window" style="width: 400px;">
                    
                    <div class="title-bar">
                        <div class="title-bar-text">Welcome to Special OS</div>
                        <div class="title-bar-controls">
                            <button aria-label="Close" @click="playSound('error')"></button>
                        </div>
                    </div>
                    
                    <div class="window-body" style="display: flex; padding: 12px; gap: 16px;">
                        
                        <div style="display: flex; align-items: flex-start;">
                            <img src="ico/key_win_alt.ico" alt="Keys" style="width: 32px; height: 32px; image-rendering: pixelated;">
                        </div>

                        <div style="flex-grow: 1; display: flex; flex-direction: column; gap: 12px;">
                            <p style="margin: 0;">Type a username and password to log on to Special OS.</p>
                            
                            <div style="display: flex; flex-direction: column; gap: 6px;">
                                <div class="field-row" style="align-items: center;">
                                    <label for="username" style="width: 120px;">User name:</label>
                                    <input id="username" type="text" x-model="$store.system.loginUsername" style="width: 100%;">
                                </div>
                                
                                <div class="field-row" style="align-items: center;">
                                    <label for="password" style="width: 120px;">Password:</label>
                                    <input id="password" type="password" 
                                        x-model="$store.system.loginPassword" 
                                        @keydown.enter="bootSystem()" 
                                        style="width: 100%;">
                                </div>
                            </div>
                        </div>

                        <div style="display: flex; flex-direction: column; gap: 6px;">
                            <button style="width: 75px;" @click="bootSystem()">OK</button>
                            <button style="width: 75px;" @click="playSound('error')">Cancel</button>
                        </div>
                        
                    </div>
                </div>
            </div>

            <div id="splash-screen" 
                x-show="isBooting" 
                x-transition.opacity.duration.500ms>
                
                <img src="images/boot.jpg" alt="System Loading">
                
            </div>

            <div id="desktop" @click.self="clearSelection()">

                <!-- RENDER ICONS -->
                <template x-for="icon in $store.system.desktopIcons" :key="icon.id">
                    
                    <div class="desktop-icon" 
                        @dblclick="$dispatch('open-app', { 
                            id: icon.appId, 
                            payload: icon.payload 
                        })"
                        style="display: inline-flex; flex-direction: column; align-items: center; cursor: pointer; color: white; width: 75px;">
                        
                        <img :src="icon.img" alt="icon" style="width: 32px; height: 32px; margin-bottom: 4px;">
                        
                        <div style="font-size: 12px; text-shadow: 1px 1px 1px black; text-align: center; word-wrap: break-word;" 
                            x-text="icon.title"></div>

                    </div>
                    
                </template>

                <!-- RENDER WINDOWS -->
                <template x-for="win in openWindows" :key="win.instanceId">
                    
                    <div class="window" 
                        x-data="draggableWindow(win.startX, win.startY)" 
                        @mousedown="focusWindow(win.instanceId)"
                        :style="`position: absolute; left: ${x}px; top: ${y}px; width: ${win.width}px; z-index: ${win.zIndex || 10}; ${win.height ? 'height: ' + win.height + 'px; display: flex; flex-direction: column;' : ''}`">
                        
                        <div class="title-bar" 
                            @mousedown.prevent="dragStart" 
                            @mousemove.window="drag" 
                            @mouseup.window="dragEnd"
                            style="cursor: grab;"
                            :style="isDragging && { cursor: 'grabbing' }">

                            <div style="display: flex; align-items: center; gap: 5px;">
                                <img class="title-bar-icon" :src="win.icon" width="16" height="16">
                                <div class="title-bar-text" x-text="win.title"></div>
                            </div>

                            <div class="title-bar-controls">
                                <button aria-label="Close" @click="closeProgram(win.instanceId)"></button>
                            </div>
                        </div>
                        
                        <!-- WINDOW TEMPLATES -->
                        <div class="window-body" :style="win.height ? 'flex-grow: 1; overflow: auto;' : ''">

                            <template x-if="win.id === 'accessibility'">
                                <div x-data="AccessibilityApp" x-html="htmlContent"></div>
                            </template>

                            <template x-if="win.id === 'mail'">
                                <div x-data="MailApp" x-html="htmlContent" style="height: 100%; display: flex; flex-direction: column;"></div>
                            </template>

                            <template x-if="win.id === 'mail_reader'">
                                <div x-data="MailReaderApp(win.payload)" x-html="htmlContent" style="height: 100%; display: flex; flex-direction: column;"></div>
                            </template>

                            <template x-if="win.id === 'mail_compose'">
                                <div x-data="MailComposeApp" x-html="htmlContent" style="height: 100%; display: flex; flex-direction: column;"></div>
                            </template>

                            <template x-if="win.id === 'file_explorer'">
                                <div x-data="FileExplorerApp(win.payload)" x-html="htmlContent" style="height: 100%; display: flex; flex-direction: column;"></div>
                            </template>

                            <template x-if="win.id === 'notepad'">
                                <div x-data="NotepadApp(win.payload)" x-html="htmlContent" style="height: 100%; display: flex; flex-direction: column;"></div>
                            </template>

                            <template x-if="win.id === 'bin'">
                                <div x-data="BinApp" x-html="htmlContent"></div>
                            </template>
                            
                            <template x-if="win.id !== 'mail' && win.id !== 'bin'">
                                <p x-text="win.content"></p>
                            </template>

                        </div>
                        
                    </div>
                </template>

                <div class="taskbar" x-data="Game">

                    <div style="position: relative; margin-left: 6px; margin-right: 6px;">
                        
                        <button x-on:click="isStartOpen = !isStartOpen" 
                                style="font-weight: bold; padding: 2px 5px;">
                            <img src="ico/windows.ico" alt="Start" style="width: 16px; vertical-align: middle;"> Start
                        </button>

                        <div class="window start-menu" 
                            x-show="isStartOpen" 
                            x-cloak 
                            x-on:click.outside="isStartOpen = false">
                            
                            <div class="title-bar" style="background: linear-gradient(90deg, navy, #1084d0);">
                                <div class="title-bar-text">Special OS</div>
                            </div>
                            <div class="window-body" style="margin: 0; padding: 5px;">
                                <button style="width: 100%; text-align: left; margin-bottom: 3px;">Outlook Express</button>
                                <button style="width: 100%; text-align: left; margin-bottom: 3px;">Microsoft Excel</button>
                                <hr style="margin: 5px 0;">
                                <button style="width: 100%; text-align: left;">Log Off...</button>
                            </div>
                        </div>

                    </div>

                    <div style="display: flex; gap: 4px;">
                        <img class="sound-control" src="ico/loudspeaker_rays.ico"  width="16" height="16">
                        <div class="status-bar-field" style="width: 60px; text-align: center;">
                            <span x-text="$store.system.currentInGameTime"></span>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div x-data="ShutdownScreenApp" x-show="$store.system.isGameOver" x-html="htmlContent"></div>
</body>
</html>
