<div style="display: flex; flex-direction: column; height: 100%; background: #c0c0c0; padding: 4px; box-sizing: border-box; font-family: 'Pixelated MS Sans Serif', Arial, sans-serif;">
    <div style="display: flex; flex-grow: 1; gap: 4px; overflow: hidden;">
        
        <div class="sunken-panel" style="width: 40%; background: white; display: flex; flex-direction: column; overflow-y: auto;">
            <div style="background: navy; color: white; padding: 3px 6px; font-weight: bold; font-size: 11px; position: sticky; top: 0; z-index: 1;">
                Contacts
            </div>
            
            <ul class="tree-view" style="border: none; background: transparent; padding: 0; margin: 0;">
                <template x-for="contact in contacts" :key="contact.id">
                    <li @click="selectContact(contact)" 
                        :style="selectedContact?.id === contact.id ? 'background: #000080; color: white;' : ''"
                        style="list-style-type: none; padding: 6px; margin: 2px; cursor: pointer; display: flex; align-items: center; gap: 6px; border: 1px solid transparent;">
                        
                        <div style="overflow: hidden">
                            <div style="display: flex; gap: 4px;">
                                <img src="ico/media_player_stream_sun4.ico" width="16" height="16" style="image-rendering: pixelated;">
                                <div style="font-size: 12px; font-weight: bold; white-space: nowrap; text-overflow: ellipsis; overflow: hidden;" x-text="contact.name"></div>
                            </div>
                                <div style="font-size: 10px; color: gray;" :style="selectedContact?.id === contact.id ? 'color: #d0d0d0; margin-left: 20px;' : ''" x-text="contact.status"></div>
                        </div>
                    </li>
                </template>
            </ul>
        </div>

        <div style="flex-grow: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden;">
            
            <div class="sunken-panel" style="background: #e0e0e0; padding: 6px 10px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;">
                <img src="ico/key_win_alt.ico" alt="Player Avatar" style="width: 24px; height: 24px; image-rendering: pixelated;">
                <div>
                    <div style="font-size: 10px; color: #555; text-transform: uppercase;">Logged in as:</div>
                    <strong style="font-size: 14px; color: #000;" x-text="$store.system.loginUsername || 'Guest_User'"></strong>
                </div>
            </div>

            <div id="chat-history-container" class="sunken-panel" style="flex-grow: 1; background: white; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;">
                <template x-if="selectedContact">
                    <template x-for="(msg, index) in selectedContact.history" :key="index">
                        
                        <div style="font-size: 12px; width: 100%;">
                            
                            <template x-if="msg.sender === 'player'">
                                <div style="text-align: right; padding-left: 20%;">
                                    <span style="font-weight: bold; color: #0000a0;" x-text="$store.system.loginUsername || 'Me'"></span>
                                    <span style="color: gray;"> says:</span>
                                    <div style="color: black; margin-top: 2px; display: inline-block; text-align: left; background: #f0f8ff; padding: 4px 8px; border: 1px solid #b0d0ff; border-radius: 4px;" x-text="msg.text"></div>
                                </div>
                            </template>
                            
                            <template x-if="msg.sender === 'npc'">
                                <div style="text-align: left; padding-right: 20%;">
                                    <span style="font-weight: bold; color: #8b0000;" x-text="selectedContact.name"></span>
                                    <span style="color: gray;"> says:</span>
                                    <div style="color: black; margin-top: 2px; display: inline-block; background: #fff0f0; padding: 4px 8px; border: 1px solid #ffb0b0; border-radius: 4px;" x-text="msg.text"></div>
                                </div>
                            </template>
                            
                        </div>
                        
                    </template>
                </template>
            </div>
            
            <div class="sunken-panel" style="background: #c0c0c0; padding: 8px; flex-shrink: 0; min-height: 70px; display: flex; flex-direction: column; gap: 6px;">
                <div style="font-size: 11px; color: #333; font-weight: bold; border-bottom: 1px solid #888; padding-bottom: 4px;">
                    Available responses:
                </div>
                
                <div style="display: flex; flex-wrap: wrap; gap: 6px; overflow-y: auto; max-height: 100px;">
                    <template x-if="selectedContact">
                        
                        <template x-for="option in selectedContact.options" :key="option.id">
                            
                            <button x-show="canSeeOption(option)" 
                                    @click="sendMessage(option)" 
                                    style="padding: 4px 10px; font-family: 'Pixelated MS Sans Serif', Arial, sans-serif; font-size: 11px; cursor: pointer;">
                                <span x-text="option.text"></span>
                            </button>
                            
                        </template>
                        
                    </template>
                    
                    <template x-if="selectedContact && selectedContact.options.filter(o => canSeeOption(o)).length === 0">
                        <div style="font-size: 11px; color: #666; font-style: italic; margin-top: 4px; padding: 2px;">
                            Waiting for new intel or required actions to unlock dialogue...
                        </div>
                    </template>
                </div>
            </div>

        </div>
    </div>
</div>
