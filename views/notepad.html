<div style="display: flex; flex-direction: column; height: 100%; background: #c0c0c0;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 2px 6px; border-bottom: 1px solid #808080;">
        <div style="display: flex; gap: 10px;">
            <button x-show="isInteractive && !fileData.isLocked" 
                @click="saveFile()"
                class="default" 
                style="height: 20px; font-size: 11px;">
                    Save Changes
            </button>
            <button x-show="!fileData.isLocked" 
                    @click="requestDelete()" 
                    class="default" 
                    style="height: 20px; font-size: 11px;">
                Delete File
            </button>
        </div>
    </div>

    <div class="sunken-panel" style="flex-grow: 1; padding: 6px; background: white; overflow-y: auto;">
        
        <template x-if="!isInteractive">
            <textarea style="width: 100%; height: 100%; border: none; outline: none; resize: none; font-family: 'Courier New', Courier, monospace; font-size: 14px; word-wrap: break-word;" 
                      readonly 
                      x-text="fileData ? fileData.content : ''">
            </textarea>
        </template>

        <template x-if="isInteractive">
            <div style="font-family: 'Courier New', Courier, monospace; font-size: 0; line-height: 1.8; word-wrap: break-word;">
                
                <div x-show="fileData.isLocked" style="color: darkred; font-weight: bold; margin-bottom: 10px; font-size: 14px;">
                    [READ-ONLY - CHANGES FINALISED]
                </div>

                <template x-for="(segment, index) in fileData.content" :key="segment.id || index">
                    <span style="display: inline;">
                        
                        <template x-if="segment.type === 'text'">
                            <span x-text="segment.text" style="white-space: pre-wrap; font-size: 14px;"></span>
                        </template>
                        
                        <template x-if="segment.type === 'interactive'">
                            <span style="position: relative; display: inline-block; font-size: 14px;">
                                
                                <span @click="toggleDropdown(segment.id)"
                                      :style="fileData.isLocked ? 'color: black; font-weight: bold;' : (activeDropdown === segment.id ? 'color: white; background: #000080; cursor: pointer; text-decoration: none;' : 'color: var(--highlight-color, #000080); cursor: pointer; text-decoration: underline; font-weight: bold; background: #ffffcc;')"
                                      x-text="segment.selectedValue ? segment.options.find(o => o.value === segment.selectedValue)?.text : '[ Click to fill in ]'">
                                </span>

                                <div x-show="activeDropdown === segment.id && !fileData.isLocked"
                                     @click.away="activeDropdown = null"
                                     style="position: absolute; top: 100%; left: 0; background: white; border: 1px solid black; box-shadow: 2px 2px 0px rgba(0,0,0,0.5); z-index: 9999; min-width: 200px; max-width: 280px; margin-top: 2px; padding: 1px; font-weight: normal; text-decoration: none;">
                                    
                                    <template x-for="option in segment.options" :key="option.value">
                                        <template x-if="option.value !== null">
                                            
                                            <div @click="segment.selectedValue = option.value; activeDropdown = null;"
                                                 @mouseenter="$el.style.background = '#000080'; $el.style.color = 'white'"
                                                 @mouseleave="$el.style.background = 'transparent'; $el.style.color = 'black'"
                                                 style="padding: 4px 6px; cursor: pointer; color: black; background: transparent; word-wrap: break-word; line-height: 1.2;"
                                                 x-text="option.text">
                                            </div>
                                            
                                        </template>
                                    </template>
                                    
                                </div>

                            </span>
                        </template>

                    </span>
                </template>
                
            </div>
        </template>

    </div>
</div>
