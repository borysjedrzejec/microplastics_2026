<div style="display: flex; flex-direction: column; height: 100%; padding: 6px; background: #c0c0c0;">
    
    <div style="margin-bottom: 10px; border-bottom: 2px groove #fff; padding-bottom: 10px;">
        <div class="field-row" style="margin-bottom: 4px;">
            <label style="width: 80px; text-align: right; font-weight: bold;">From:</label>
            <span x-text="message?.sender"></span>
        </div>
        <div class="field-row" style="margin-bottom: 4px;">
            <label style="width: 80px; text-align: right; font-weight: bold;">Sent:</label>
            <span x-text="message?.received || '2025-10-01'"></span>
        </div>
        <div class="field-row" style="margin-bottom: 4px;">
            <label style="width: 80px; text-align: right; font-weight: bold;">To:</label>
            <span x-text="$store.system.playerEmail"></span>
        </div>
        <div class="field-row">
            <label style="width: 80px; text-align: right; font-weight: bold;">Subject:</label>
            <span x-text="message?.subject"></span>
        </div>
    </div>

    <div class="sunken-panel" 
         style="flex-grow: 1; background: white; padding: 10px; overflow-y: auto;" 
         x-html="message?.body">
    </div>

</div>
