<fieldset style="padding: 15px;">
    <legend>Settings</legend>
    
    <div style="display: flex; flex-direction: column; gap: 15px;">
        
        <template x-for="setting in settings" :key="setting.id">
            <div class="field-row" style="align-items: center;">
                <img :src="setting.icon" alt="" style="width: 32px; height: 32px; margin-right: 15px;">
                <input type="checkbox" :id="setting.id" x-model="$store.accessibility[setting.id]">
                <label :for="setting.id" x-text="setting.label" style="cursor: pointer;"></label>
            </div>
        </template>

        <div style="margin: 5px 0; border-top: 1px solid #808080; border-bottom: 1px solid #fff;"></div>

        <div class="field-row" style="align-items: flex-start;">
            <img src="ico/paint.ico" alt="" style="width: 32px; height: 32px; margin-right: 15px;">
            
            <div style="flex-grow: 1;">
                <label style="display: block; margin-bottom: 6px;">Highlight Colour</label>
                
                <div style="display: block; text-align: center; background: #808080; padding: 2px; border: 1px solid #fff; border-right-color: #808080; border-bottom-color: #808080; display: inline-block;">
                    <div style="background: #c0c0c0; padding: 3px; display: flex; gap: 3px; border: 1px inset #fff;">
                        
                        <template x-for="(color, name) in $store.accessibility.palettes" :key="name">
                            <div @click="$store.accessibility.updateHighlightColor(name)"
                                 :title="name.toUpperCase()"
                                 :style="`
                                    width: 16px; 
                                    height: 16px; 
                                    cursor: pointer; 
                                    background: ${color}; 
                                    box-sizing: border-box;
                                    border: 2px ${$store.accessibility.colorMode === name ? 'inset' : 'outset'} #fff;
                                    outline: ${$store.accessibility.colorMode === name ? '1px solid #000' : 'none'};
                                    outline-offset: -2px;
                                 `"
                                 @mouseenter="$el.style.outline = '1px solid #000'; $el.style.outlineOffset = '-2px';"
                                 @mouseleave="if($store.accessibility.colorMode !== name) { $el.style.outline = 'none'; }">
                            </div>
                        </template>

                    </div>
                </div>
                
                <div style="margin-top: 4px; font-size: 10px; color: #505050; text-transform: uppercase;">
                    [<span x-text="$store.accessibility.colorMode" style="font-weight: bold;"></span>]
                </div>
            </div>
        </div>

    </div>
</fieldset>

<div style="display: flex; justify-content: flex-end; margin-top: 15px; gap: 5px;">
    <button @click="closeProgram('accessibility')">OK</button>
</div>
