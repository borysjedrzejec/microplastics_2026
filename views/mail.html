<div style="height: 100%; display: flex; flex-direction: column;">
    <div style="flex-grow: 1; display: flex; margin-top: 4px; gap: 4px; min-height: 0;">
        
        <ul class="tree-view" style="width: 30%; overflow-y: auto; margin: 0;">
            <li><strong>Local Folder</strong>
                <ul>
                    <li>
                        <span style="cursor: pointer;" 
                            @click="currentFolder = 'inbox'"
                            :style="getUnreadCount('inbox') > 0 ? 'font-weight: bold;' : 'font-weight: normal;'">
                            Inbox 
                            <span x-show="getUnreadCount('inbox') > 0" 
                                x-text="`(${getUnreadCount('inbox')})`"></span>
                        </span>
                    </li>
                    <li style="cursor: pointer;" @click="currentFolder = 'sent'">Sent</li>
                    <li style="cursor: pointer;" @click="currentFolder = 'archived'">Archived</li>
                </ul>
            </li>
        </ul>

        <div class="sunken-panel" style="width: 70%; background: white; overflow-y: auto;">
            <table style="width: 100%; border-collapse: collapse;">
                <thead style="background: #c0c0c0; text-align: left;">
                    <tr>
                        <th style="padding: 2px 4px; border-right: 1px solid #808080; border-bottom: 1px solid #808080;">Sender</th>
                        <th style="padding: 2px 4px; border-right: 1px solid #808080; border-bottom: 1px solid #808080;">Subject</th>
                    </tr>
                </thead>
                
                <tbody>
                    <template x-for="msg in filteredMessages" :key="msg.id">
                        <tr @dblclick="$dispatch('open-app', { 
                                id: 'mail_reader', 
                                payload: { id: msg.id, title: msg.subject } 
                            })"
                            style="cursor: pointer;"
                            :style="msg.unread ? 'font-weight: bold; color: black;' : 'color: #333;'">
                            
                            <td style="padding: 2px 4px;">
                                <span x-show="msg.pinned" style="color: #FFD700; margin-right: 4px;">⭐</span>
                                <span x-text="msg.sender"></span>
                            </td>
                            <td x-text="msg.subject" style="padding: 2px 4px;"></td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
        
    </div>
</div>
