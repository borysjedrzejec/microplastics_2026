<div class="window">
    
    <div class="title-bar">
        <div class="title-bar-text">Task Manager</div>
        <div class="title-bar-controls">
            <button aria-label="Minimize" disabled></button>
        </div>
    </div>
    
    <div class="window-body" style="padding: 8px;">
        
        <fieldset>
            <legend>Active Tasks</legend>
            <template x-for="task in $store.tasks.activeTasks" :key="task.id">
                <div style="margin-bottom: 12px;">
                    <div class="field-row" style="align-items: flex-start;">
                        <input type="checkbox" :id="'task_' + task.id" disabled>
                        <label :for="'task_' + task.id" style="font-weight: bold; margin-top: 2px;" x-text="task.title"></label>
                    </div>
                    <div style="margin-left: 22px; margin-top: 4px; font-size: 11px; color: #555;" x-text="task.description"></div>
                </div>
            </template>
            <div x-show="$store.tasks.activeTasks.length === 0" style="color: #666; font-style: italic; margin-left: 5px;">
                No active tasks.
            </div>
        </fieldset>

        <div x-show="$store.tasks.completedTasks.length > 0" style="margin-top: 10px;">
            <fieldset>
                <legend>Completed</legend>
                <template x-for="task in $store.tasks.completedTasks" :key="task.id">
                    <div class="field-row" style="margin-bottom: 6px;">
                        <input type="checkbox" :id="'task_' + task.id" checked disabled>
                        <label :for="'task_' + task.id" style="text-decoration: line-through; color: #888;" x-text="task.title"></label>
                    </div>
                </template>
            </fieldset>
        </div>

    </div>
</div>
