<div style="display: flex; flex-direction: column; height: 100%; background: #c0c0c0; font-family: 'Pixelated MS Sans Serif', Arial, sans-serif;">
    
    <div style="margin-bottom: 6px; border-bottom: 2px groove #fff; padding-bottom: 6px; display: flex; gap: 5px;">
        <button @click="goBack()" :disabled="view === 'list'" style="width: 80px;">Back</button>
        <div class="sunken-panel" style="flex-grow: 1; padding: 2px 6px; display: flex; align-items: center; background: white; height: 22px;">
            <span style="color: #666; font-weight: bold; margin-right: 5px;">CorpNet://</span>
            <span x-text="view === 'list' ? 'employee_directory' : selectedAccount.id"></span>
        </div>
    </div>

    <div class="sunken-panel" style="flex-grow: 1; background: white; display: flex; flex-direction: column; overflow-y: auto;">
        
        <template x-if="view === 'list'">
            <div style="padding: 10px;">
                <h4 style="margin-top: 0; border-bottom: 1px solid #ccc; padding-bottom: 4px;">Intranet Directory</h4>
                <p style="font-size: 11px;">Select an employee profile to request access:</p>
                
                <ul class="tree-view" style="border: none; background: transparent;">
                    <template x-for="acc in accounts" :key="acc.id">
                        <li style="margin-bottom: 5px; list-style-type: none; border-bottom: 1px dotted #eee; padding: 2px 6px;">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <strong x-text="acc.name"></strong>
                                    <div style="font-size: 11px; color: gray;" x-text="'Department: ' + acc.department"></div>
                                </div>
                                <button @click="openLogin(acc)" style="min-width: 60px;">Connect</button>
                            </div>
                        </li>
                    </template>
                </ul>
            </div>
        </template>

        <template x-if="view === 'login'">
            <div style="flex-grow: 1; display: flex; flex-direction: column; background: #c0c0c0; padding: 24px; box-sizing: border-box; overflow-y: auto;">
                
                <div style="text-align: center; margin-bottom: 15px;">
                    <h1 style="margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 1px 1px 0px #fff, 2px 2px 0px #888; color: var(--highlight-color, #000080);">
                        Authorisation Required
                    </h1>
                </div>

                <template x-if="selectedAccount.isLocked">
                    <div style="margin: 0 auto; width: 80%; color: darkred; background: black; padding: 15px; border: 2px inset gray; font-family: monospace; font-size:16px; text-align: center;">
                        ACCESS DENIED.<br>ACCOUNT HAS BEEN<br>PERMANENTLY LOCKED.
                    </div>
                </template>

                <template x-if="!selectedAccount.isLocked">
                    <div style="margin: 0 auto; width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 20px;">

                        <div x-show="errorMessage" style="color: darkred; font-weight: bold; font-size: 12px; text-align: center;" x-text="errorMessage"></div>
                        
                        <div style="display: flex; gap: 16px; align-items: flex-start;">
                            
                            <div style="display: flex; align-items: flex-start; padding-top: 5px;">
                                <img src="ico/key_world.ico" alt="Icon" style="width: 32px; height: 32px; image-rendering: pixelated;">
                            </div>

                            <div style="flex-grow: 1; display: flex; flex-direction: column; gap: 12px;">
                                <p style="margin: 0; font-size: 12px;">Type a username and password to log on to the Intranet.</p>
                                
                                <div style="display: flex; flex-direction: column; gap: 8px;">
                                    <div class="field-row" style="align-items: center;">
                                        <label style="width: 80px; text-align: right; margin-right: 5px;">User name:</label>
                                        <input type="text" readonly :value="selectedAccount.id.replace('acc_', '')" style="flex-grow: 1; background: #e0e0e0; color: #333;">
                                    </div>
                                    
                                    <div class="field-row" style="align-items: center;">
                                        <label style="width: 80px; text-align: right; margin-right: 5px;">Password:</label>
                                        <input type="text" readonly x-model="selectedPassword" style="flex-grow: 1; background: #e0e0e0; color: #000; font-family: 'Courier New', monospace; letter-spacing: 2px;">
                                    </div>
                                </div>
                            </div>

                            <div style="display: flex; flex-direction: column; gap: 6px;">
                                <button style="width: 75px; height: 22px;" @click="submitPassword()" :disabled="!selectedPassword">OK</button>
                                <button style="width: 75px; height: 22px;" @click="goBack()">Cancel</button>
                            </div>
                        </div>

                        <div style="border-top: 2px groove #fff; padding-top: 15px;">
                            <p style="font-size: 11px; margin-top: 0; margin-bottom: 15px; text-align: center;">
                                Possible passwords for <strong x-text="selectedAccount.name"></strong> (click to select):
                            </p>
                            
                            <div style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;">
                                <template x-for="option in selectedAccount.options" :key="option">
                                    <button @click="selectedPassword = option" 
                                            :class="{ 'default': selectedPassword === option }"
                                            :style="selectedPassword === option ? 'border: 2px inset #fff; background: #d0d0d0;' : ''"
                                            style="padding: 4px 12px; font-family: monospace; font-size: 13px; cursor: pointer;">
                                        <span x-text="option"></span>
                                    </button>
                                </template>
                            </div>
                        </div>

                    </div>
                </template>

            </div>
        </template>

        <template x-if="view === 'success'">
            <div style="flex-grow: 1; display: flex; flex-direction: column; background: #c0c0c0; padding: 24px; box-sizing: border-box; justify-content: center; align-items: center;">
                
                <img src="ico/directory_open_net_web_documents.ico" alt="Directory" style="width: 48px; height: 48px; margin-bottom: 15px;">
                <h2 style="color: darkgreen; margin: 0 0 20px 0; font-size: 24px;">Connection Established</h2>

                <div style="padding: 20px; border: 2px inset #fff; background: #e8e8e8; text-align: center; max-width: 400px;">
                    <p style="font-size: 13px; margin-top: 0; margin-bottom: 20px;">
                        Successfully authenticated with the server for account:<br><br>
                        <strong x-text="selectedAccount.name" style="font-size: 15px;"></strong>
                    </p>
                    
                    <button @click="openUserFolder()" class="default" style="font-weight: bold; padding: 8px 20px; font-size: 12px;">
                        Open Shared Folder
                    </button>
                </div>
                
            </div>
        </template>

    </div>
</div>
